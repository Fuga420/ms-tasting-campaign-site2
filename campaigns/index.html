<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M's Tasting Room｜Backnumber</title>
  <meta name="description" content="M's Tasting Roomの企画バックナンバー一覧です。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-data-path="../data/campaigns.json" data-root-path="../">
  <header class="site-header">
    <a class="brand" href="https://whisky-tastingroom.com/shop/ms-tastingroom/" target="_blank" rel="noopener noreferrer" aria-label="M's Tasting Room 親会社サイトへ">
      <img class="brand-logo" src="../assets/images/logo.jpg" alt="LIQUOR SHOP M's Tasting Room" />
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="../">最新企画</a>
      <a href="./">バックナンバー</a>
    </nav>
  </header>

  <main>
    <section class="hero section-shell">
      <div class="hero-copy">
        <p class="eyebrow">Campaign Archive</p>
        <h1>Backnumber</h1>
        <p class="hero-lead">過去に実施した企画ページを一覧で確認できます。現在はテスト用の仮企画を含んでいます。</p>
        <a class="button" href="../">最新企画へ戻る</a>
      </div>
      <div class="hero-visual"><img src="../assets/images/main.jpg" alt="M's Tasting Roomのウイスキー棚" /></div>
    </section>

    <section class="section-shell archive-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Archive</p>
          <h2>企画一覧</h2>
        </div>
      </div>
      <div id="campaignArchive" class="archive-grid" aria-label="Campaign archive"></div>
      <p id="archiveEmpty" class="empty-message" hidden></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>M's Tasting Room — Campaign Demo Site</p>
    <p>20歳未満の飲酒は法律で禁止されています。</p>
  </footer>

  <script src="../assets/js/backnumbers.js"></script>
</body>
</html>
